<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ===================== GOOGLE SHEETS API =====================
    const API_URL = 'https://script.google.com/macros/s/AKfycbyb0UQrTYHj9GFFnDBmF4s29bnB3M71zNKKxzqsM7T3APOw5I34-sAnG2PQev6kp9oi/exec';

    const api = {
      async getAll() {
        const response = await fetch(`${API_URL}?action=getAll`);
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        return result.data || [];
      },
      
      async add(batch) {
        const response = await fetch(`${API_URL}?action=add&data=${encodeURIComponent(JSON.stringify(batch))}`);
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        return result;
      },
      
      async update(batch) {
        const response = await fetch(`${API_URL}?action=update&data=${encodeURIComponent(JSON.stringify(batch))}`);
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        return result;
      },
      
      async delete(id) {
        const response = await fetch(`${API_URL}?action=delete&id=${id}`);
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        return result;
      }
    };

    // ===================== UTILITY FUNCTIONS =====================
    const getDayOfYear = (date) => {
      const d = new Date(date);
      const start = new Date(d.getFullYear(), 0, 1);
      const diff = d - start;
      const oneDay = 1000 * 60 * 60 * 24;
      return Math.floor(diff / oneDay) + 1;
    };

    const generateLotNumber = (date) => {
      const d = new Date(date);
      const dayOfYear = getDayOfYear(d).toString().padStart(3, '0');
      const year = d.getFullYear().toString().slice(-2);
      return `0${dayOfYear}${year}`;
    };

    const formatDateTime = (date) => {
      if (!date) return '-';
      return new Date(date).toLocaleString('it-IT', {
        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    };

    const formatDate = (date) => {
      if (!date) return '-';
      return new Date(date).toLocaleDateString('it-IT');
    };

    const calculateExpiryDate = (processingDate) => {
      if (!processingDate) return null;
      const date = new Date(processingDate);
      date.setFullYear(date.getFullYear() + 2);
      date.setMonth(date.getMonth() + 6);
      return date;
    };

    const formatExpiryDate = (processingDate) => {
      const expiry = calculateExpiryDate(processingDate);
      if (!expiry) return '-';
      return expiry.toLocaleDateString('it-IT', { month: '2-digit', year: 'numeric' });
    };

    const isExpiringSoon = (processingDate) => {
      const expiry = calculateExpiryDate(processingDate);
      if (!expiry) return false;
      const now = new Date();
      const threeMonths = new Date();
      threeMonths.setMonth(threeMonths.getMonth() + 3);
      return expiry <= threeMonths && expiry > now;
    };

    const isExpired = (processingDate) => {
      const expiry = calculateExpiryDate(processingDate);
      if (!expiry) return false;
      return expiry <= new Date();
    };

    const calculateHours = (start, end) => {
      if (!start || !end) return 0;
      const diff = new Date(end) - new Date(start);
      return Math.round((diff / (1000 * 60 * 60)) * 100) / 100;
    };

    const safeNumber = (val) => {
      const num = parseFloat(val);
      return isNaN(num) ? 0 : num;
    };

    // ===================== ICONS =====================
    const Icons = {
      Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Download: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
      Edit: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      Leaf: () => <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>,
      Package: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16.5 9.4 7.55 4.24"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" y1="22" x2="12" y2="12"/></svg>,
      Cloud: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>,
      Refresh: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    };

    // ===================== MAIN APP =====================
    function App() {
      const [batches, setBatches] = useState([]);
      const [showForm, setShowForm] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [filterProduct, setFilterProduct] = useState('');
      const [sortBy, setSortBy] = useState('date-desc');
      const [status, setStatus] = useState('loading');
      const [loading, setLoading] = useState(true);
      
      const emptyForm = {
        productType: '', productCategory: 'frutta',
        processingDate: new Date().toISOString().split('T')[0],
        freshProductKg: '', rawMaterialCostPerKg: '',
        laborHours: '', laborCostPerHour: '',
        dehydratorStart: '', dehydratorEnd: '', dehydratorCostPerHour: '',
        dryProductKg: '', bagWeightGrams: '',
        packagingCostPerBag: '', labelCostPerBag: '', markupPercentage: '', notes: ''
      };
      
      const [formData, setFormData] = useState(emptyForm);

      const loadData = async () => {
        setLoading(true);
        try {
          const data = await api.getAll();
          setBatches(data);
          setStatus('connected');
        } catch (error) {
          console.error('Errore caricamento:', error);
          setStatus('error');
        }
        setLoading(false);
      };

      useEffect(() => {
        loadData();
      }, []);

      const resetForm = () => { setFormData(emptyForm); setEditingId(null); };

      const calculateBatchData = (formData, id = null) => {
        const processingDate = formData.processingDate;
        const lotNumber = generateLotNumber(processingDate);
        const dehydrationHours = calculateHours(formData.dehydratorStart, formData.dehydratorEnd);
        
        const freshProductKg = safeNumber(formData.freshProductKg);
        const rawMaterialCostPerKg = safeNumber(formData.rawMaterialCostPerKg);
        const laborHours = safeNumber(formData.laborHours);
        const laborCostPerHour = safeNumber(formData.laborCostPerHour);
        const dehydratorCostPerHour = safeNumber(formData.dehydratorCostPerHour);
        const dryProductKg = safeNumber(formData.dryProductKg);
        const bagWeightGrams = safeNumber(formData.bagWeightGrams);
        const packagingCostPerBag = safeNumber(formData.packagingCostPerBag);
        const labelCostPerBag = safeNumber(formData.labelCostPerBag);
        const markupPercentage = safeNumber(formData.markupPercentage);
        
        return {
          id: id || Date.now().toString(),
          lotNumber,
          productType: formData.productType,
          productCategory: formData.productCategory,
          processingDate,
          freshProductKg,
          rawMaterialCostPerKg,
          laborHours,
          laborCostPerHour,
          dehydratorStart: formData.dehydratorStart || '',
          dehydratorEnd: formData.dehydratorEnd || '',
          dehydratorCostPerHour,
          dryProductKg,
          bagWeightGrams,
          packagingCostPerBag,
          labelCostPerBag,
          markupPercentage,
          notes: formData.notes || ''
        };
      };

      // Calcoli derivati per visualizzazione
      const getCalculatedFields = (batch) => {
        const dehydrationHours = calculateHours(batch.dehydratorStart, batch.dehydratorEnd);
        const rawMaterialCost = safeNumber(batch.freshProductKg) * safeNumber(batch.rawMaterialCostPerKg);
        const laborCost = safeNumber(batch.laborHours) * safeNumber(batch.laborCostPerHour);
        const dehydratorCost = dehydrationHours * safeNumber(batch.dehydratorCostPerHour);
        const productionCost = rawMaterialCost + laborCost + dehydratorCost;
        
        const dryProductKg = safeNumber(batch.dryProductKg);
        const costPerKgDry = dryProductKg > 0 ? productionCost / dryProductKg : 0;
        
        const bagWeightKg = safeNumber(batch.bagWeightGrams) / 1000;
        const numberOfBags = bagWeightKg > 0 ? Math.floor(dryProductKg / bagWeightKg) : 0;
        
        const packagingCostPerBag = safeNumber(batch.packagingCostPerBag);
        const labelCostPerBag = safeNumber(batch.labelCostPerBag);
        const totalPackagingCost = numberOfBags * (packagingCostPerBag + labelCostPerBag);
        const totalCost = productionCost + totalPackagingCost;
        
        const productCostPerBag = bagWeightKg * costPerKgDry;
        const costPerBagBase = productCostPerBag + packagingCostPerBag + labelCostPerBag;
        const markupPercentage = safeNumber(batch.markupPercentage);
        const costPerBagWithMarkup = costPerBagBase * (1 + markupPercentage / 100);
        const suggestedSellingPrice = Math.ceil(costPerBagWithMarkup * 10) / 10;
        
        const freshProductKg = safeNumber(batch.freshProductKg);
        const yieldPercentage = freshProductKg > 0 ? (dryProductKg / freshProductKg) * 100 : 0;
        
        const isComplete = freshProductKg > 0 && dryProductKg > 0 && safeNumber(batch.laborHours) > 0 && dehydrationHours > 0;

        return {
          dehydrationHours, rawMaterialCost, laborCost, dehydratorCost,
          productionCost, costPerKgDry, numberOfBags, totalPackagingCost,
          totalCost, productCostPerBag, costPerBagBase, costPerBagWithMarkup,
          suggestedSellingPrice, yieldPercentage, isComplete
        };
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        
        try {
          const batchData = calculateBatchData(formData, editingId);
          
          if (editingId) {
            await api.update(batchData);
          } else {
            await api.add(batchData);
          }
          
          await loadData();
          resetForm();
          setShowForm(false);
        } catch (error) {
          console.error('Errore salvataggio:', error);
          alert('Errore nel salvataggio: ' + error.message);
        }
        
        setLoading(false);
      };

      const handleEdit = (batch) => {
        setFormData({
          productType: batch.productType || '',
          productCategory: batch.productCategory || 'frutta',
          processingDate: batch.processingDate || '',
          freshProductKg: batch.freshProductKg?.toString() || '',
          rawMaterialCostPerKg: batch.rawMaterialCostPerKg?.toString() || '',
          laborHours: batch.laborHours?.toString() || '',
          laborCostPerHour: batch.laborCostPerHour?.toString() || '',
          dehydratorStart: batch.dehydratorStart || '',
          dehydratorEnd: batch.dehydratorEnd || '',
          dehydratorCostPerHour: batch.dehydratorCostPerHour?.toString() || '',
          dryProductKg: batch.dryProductKg?.toString() || '',
          bagWeightGrams: batch.bagWeightGrams?.toString() || '',
          packagingCostPerBag: batch.packagingCostPerBag?.toString() || '',
          labelCostPerBag: batch.labelCostPerBag?.toString() || '',
          markupPercentage: batch.markupPercentage?.toString() || '',
          notes: batch.notes || ''
        });
        setEditingId(batch.id);
        setShowForm(true);
      };

      const handleDelete = async (id) => {
        if (window.confirm('Sei sicuro di voler eliminare questo lotto?')) {
          setLoading(true);
          try {
            await api.delete(id);
            await loadData();
          } catch (error) {
            console.error('Errore eliminazione:', error);
            alert('Errore: ' + error.message);
          }
          setLoading(false);
        }
      };

      const exportToCSV = () => {
        const headers = ['Lotto','Prodotto','Categoria','Data Lavorazione','Scadenza','Kg Fresco','Costo MP €/kg','Ore Lavoro','Costo Ora €','Accensione','Spegnimento','Costo Disid €/h','Kg Secco','Peso Sacch g','Costo Imb €','Costo Etich €','Ricarico %','Note'];
        const data = filteredAndSortedBatches.map(b => [
          b.lotNumber, b.productType, b.productCategory, formatDate(b.processingDate),
          formatExpiryDate(b.processingDate), b.freshProductKg || 0, b.rawMaterialCostPerKg || 0,
          b.laborHours || 0, b.laborCostPerHour || 0, b.dehydratorStart || '', b.dehydratorEnd || '',
          b.dehydratorCostPerHour || 0, b.dryProductKg || 0, b.bagWeightGrams || 0,
          b.packagingCostPerBag || 0, b.labelCostPerBag || 0, b.markupPercentage || 0, b.notes || ''
        ]);
        let csv = '\uFEFF' + headers.join(';') + '\n';
        data.forEach(row => { csv += row.map(cell => `"${cell}"`).join(';') + '\n'; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `lotti_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
      };

      const uniqueProducts = [...new Set(batches.map(b => b.productType))].filter(Boolean);
      
      const filteredAndSortedBatches = batches
        .filter(b => !filterProduct || b.productType === filterProduct)
        .sort((a, b) => {
          const calcA = getCalculatedFields(a);
          const calcB = getCalculatedFields(b);
          switch (sortBy) {
            case 'date-desc': return new Date(b.processingDate) - new Date(a.processingDate);
            case 'date-asc': return new Date(a.processingDate) - new Date(b.processingDate);
            case 'lot': return (a.lotNumber || '').localeCompare(b.lotNumber || '');
            case 'product': return (a.productType || '').localeCompare(b.productType || '');
            case 'expiry': return calculateExpiryDate(a.processingDate) - calculateExpiryDate(b.processingDate);
            default: return 0;
          }
        });

      const totals = filteredAndSortedBatches.reduce((acc, b) => {
        const calc = getCalculatedFields(b);
        return {
          freshKg: acc.freshKg + safeNumber(b.freshProductKg),
          dryKg: acc.dryKg + safeNumber(b.dryProductKg),
          totalCost: acc.totalCost + calc.totalCost,
          totalBags: acc.totalBags + calc.numberOfBags,
          incomplete: acc.incomplete + (calc.isComplete ? 0 : 1)
        };
      }, { freshKg: 0, dryKg: 0, totalCost: 0, totalBags: 0, incomplete: 0 });

      const liveCalc = (() => {
        const dryKg = safeNumber(formData.dryProductKg);
        const freshKg = safeNumber(formData.freshProductKg);
        const rawMaterialCost = freshKg * safeNumber(formData.rawMaterialCostPerKg);
        const laborCost = safeNumber(formData.laborHours) * safeNumber(formData.laborCostPerHour);
        const dehydrationHours = calculateHours(formData.dehydratorStart, formData.dehydratorEnd);
        const dehydratorCost = dehydrationHours * safeNumber(formData.dehydratorCostPerHour);
        const productionCost = rawMaterialCost + laborCost + dehydratorCost;
        const costPerKgDry = dryKg > 0 ? productionCost / dryKg : 0;
        const bagWeightKg = safeNumber(formData.bagWeightGrams) / 1000;
        const numberOfBags = bagWeightKg > 0 ? Math.floor(dryKg / bagWeightKg) : 0;
        const productCostPerBag = bagWeightKg * costPerKgDry;
        const costPerBagBase = productCostPerBag + safeNumber(formData.packagingCostPerBag) + safeNumber(formData.labelCostPerBag);
        const costPerBagWithMarkup = costPerBagBase * (1 + safeNumber(formData.markupPercentage) / 100);
        const suggestedPrice = Math.ceil(costPerBagWithMarkup * 10) / 10;
        const yieldPct = freshKg > 0 ? (dryKg / freshKg) * 100 : 0;
        return { dehydrationHours, productionCost, costPerKgDry, numberOfBags, costPerBagBase, suggestedPrice, yieldPct };
      })();

      const categoryBadge = (cat) => ({ frutta: 'badge-red', verdura: 'badge-green', erbe: 'badge-emerald', funghi: 'badge-amber', altro: 'badge-gray' }[cat] || 'badge-gray');

      return (
        <div>
          {loading && <div className="loading-overlay"><div className="spinner"></div></div>}
          
          <header className="header">
            <div className="container">
              <div className="header-content">
                <div className="header-title">
                  <div className="header-icon"><Icons.Leaf /></div>
                  <div>
                    <h1>Gestione Lotti</h1>
                    <p>Disidratazione</p>
                  </div>
                </div>
                <div className="header-buttons">
                  <span className={`status-bar ${status}`}>
                    <Icons.Cloud /> {status === 'connected' ? 'Online' : status === 'error' ? 'Errore' : 'Carico...'}
                  </span>
                  <button onClick={loadData} className="btn btn-secondary" title="Ricarica"><Icons.Refresh /></button>
                  <button onClick={exportToCSV} disabled={batches.length === 0} className="btn btn-secondary"><Icons.Download /></button>
                  <button onClick={() => { resetForm(); setShowForm(true); }} className="btn btn-primary"><Icons.Plus /></button>
                </div>
              </div>
            </div>
          </header>

          <main className="container">
            {batches.length > 0 && (
              <>
                <div className="stats-grid">
                  <div className="card stat-card"><p>Lotti</p><p className="text-amber">{filteredAndSortedBatches.length}</p></div>
                  <div className="card stat-card"><p>Fresco</p><p className="text-green">{totals.freshKg.toFixed(1)}kg</p></div>
                  <div className="card stat-card"><p>Secco</p><p className="text-orange">{totals.dryKg.toFixed(1)}kg</p></div>
                  <div className="card stat-card"><p>Sacchetti</p><p className="text-indigo">{totals.totalBags}</p></div>
                  <div className="card stat-card"><p>Costo</p><p className="text-red">€{totals.totalCost.toFixed(0)}</p></div>
                  <div className="card stat-card"><p>Incompleti</p><p className="text-purple">{totals.incomplete}</p></div>
                </div>

                <div className="card filters">
                  <div className="filter-group">
                    <label>Prodotto:</label>
                    <select value={filterProduct} onChange={(e) => setFilterProduct(e.target.value)}>
                      <option value="">Tutti</option>
                      {uniqueProducts.map(p => <option key={p} value={p}>{p}</option>)}
                    </select>
                  </div>
                  <div className="filter-group">
                    <label>Ordina:</label>
                    <select value={sortBy} onChange={(e) => setSortBy(e.target.value)}>
                      <option value="date-desc">Data ↓</option>
                      <option value="date-asc">Data ↑</option>
                      <option value="lot">Lotto</option>
                      <option value="product">Prodotto</option>
                      <option value="expiry">Scadenza</option>
                    </select>
                  </div>
                </div>
              </>
            )}

            {showForm && (
              <div className="modal-overlay">
                <div className="modal">
                  <div className="modal-header">
                    <div>
                      <h2>{editingId ? 'Modifica' : 'Nuovo'} Lotto</h2>
                      {formData.processingDate && <p className="lot-number">Lotto: {generateLotNumber(new Date(formData.processingDate))} • Scad: {formatExpiryDate(formData.processingDate)}</p>}
                    </div>
                    {liveCalc.costPerKgDry > 0 && (
                      <div className="preview-box">
                        <p className="label">ANTEPRIMA</p>
                        {liveCalc.numberOfBags > 0 && <p className="value">{liveCalc.numberOfBags} × €{liveCalc.suggestedPrice.toFixed(2)}</p>}
                        <p className="sub">€{liveCalc.costPerKgDry.toFixed(2)}/kg</p>
                      </div>
                    )}
                  </div>
                  
                  <form onSubmit={handleSubmit}>
                    <div className="modal-body">
                      <div className="form-grid form-grid-3" style={{marginBottom: '20px'}}>
                        <div className="form-group">
                          <label>Prodotto <span className="required-star">*</span></label>
                          <input type="text" required placeholder="es. Mele" value={formData.productType} onChange={(e) => setFormData({...formData, productType: e.target.value})} />
                        </div>
                        <div className="form-group">
                          <label>Categoria <span className="required-star">*</span></label>
                          <select required value={formData.productCategory} onChange={(e) => setFormData({...formData, productCategory: e.target.value})}>
                            <option value="frutta">Frutta</option>
                            <option value="verdura">Verdura</option>
                            <option value="erbe">Erbe</option>
                            <option value="funghi">Funghi</option>
                            <option value="altro">Altro</option>
                          </select>
                        </div>
                        <div className="form-group">
                          <label>Data <span className="required-star">*</span></label>
                          <input type="date" required value={formData.processingDate} onChange={(e) => setFormData({...formData, processingDate: e.target.value})} />
                        </div>
                      </div>

                      <div className="form-section green">
                        <h3>🥬 Materia Prima</h3>
                        <div className="form-grid form-grid-2">
                          <div className="form-group">
                            <label>Kg Fresco</label>
                            <input type="number" step="0.01" min="0" placeholder="0" value={formData.freshProductKg} onChange={(e) => setFormData({...formData, freshProductKg: e.target.value})} />
                          </div>
                          <div className="form-group">
                            <label>Costo €/kg</label>
                            <input type="number" step="0.01" min="0" placeholder="0" value={formData.rawMaterialCostPerKg} onChange={(e) => setFormData({...formData, rawMaterialCostPerKg: e.target.value})} />
                          </div>
                        </div>
                      </div>

                      <div className="form-section blue">
                        <h3>👷 Manodopera</h3>
                        <div className="form-grid form-grid-2">
                          <div className="form-group">
                            <label>Ore</label>
                            <input type="number" step="0.25" min="0" placeholder="0" value={formData.laborHours} onChange={(e) => setFormData({...formData, laborHours: e.target.value})} />
                          </div>
                          <div className="form-group">
                            <label>€/ora</label>
                            <input type="number" step="0.01" min="0" placeholder="0" value={formData.laborCostPerHour} onChange={(e) => setFormData({...formData, laborCostPerHour: e.target.value})} />
                          </div>
                        </div>
                      </div>

                      <div className="form-section orange">
                        <h3>🔥 Disidratatore</h3>
                        <div className="form-grid form-grid-3">
                          <div className="form-group">
                            <label>Accensione</label>
                            <input type="datetime-local" value={formData.dehydratorStart} onChange={(e) => setFormData({...formData, dehydratorStart: e.target.value})} />
                          </div>
                          <div className="form-group">
                            <label>Spegnimento</label>
                            <input type="datetime-local" value={formData.dehydratorEnd} onChange={(e) => setFormData({...formData, dehydratorEnd: e.target.value})} />
                          </div>
                          <div className="form-group">
                            <label>€/ora</label>
                            <input type="number" step="0.01" min="0" placeholder="0" value={formData.dehydratorCostPerHour} onChange={(e) => setFormData({...formData, dehydratorCostPerHour: e.target.value})} />
                          </div>
                        </div>
                        {liveCalc.dehydrationHours > 0 && <p className="form-info text-orange">⏱️ {liveCalc.dehydrationHours.toFixed(1)}h</p>}
                      </div>

                      <div className="form-section amber">
                        <h3>📦 Prodotto Finito</h3>
                        <div className="form-group">
                          <label>Kg Secco</label>
                          <input type="number" step="0.01" min="0" placeholder="0" value={formData.dryProductKg} onChange={(e) => setFormData({...formData, dryProductKg: e.target.value})} />
                        </div>
                        {liveCalc.yieldPct > 0 && <p className="form-info text-amber">📊 Resa: {liveCalc.yieldPct.toFixed(1)}%</p>}
                      </div>

                      <div className="form-section purple">
                        <h3><Icons.Package /> Confezionamento</h3>
                        <div className="form-grid form-grid-4">
                          <div className="form-group">
                            <label>Peso (g)</label>
                            <input type="number" step="1" min="0" placeholder="50" value={formData.bagWeightGrams} onChange={(e) => setFormData({...formData, bagWeightGrams: e.target.value})} />
                          </div>
                          <div className="form-group">
                            <label>Imball. €</label>
                            <input type="number" step="0.01" min="0" placeholder="0" value={formData.packagingCostPerBag} onChange={(e) => setFormData({...formData, packagingCostPerBag: e.target.value})} />
                          </div>
                          <div className="form-group">
                            <label>Etich. €</label>
                            <input type="number" step="0.01" min="0" placeholder="0" value={formData.labelCostPerBag} onChange={(e) => setFormData({...formData, labelCostPerBag: e.target.value})} />
                          </div>
                          <div className="form-group">
                            <label>Ricarico %</label>
                            <input type="number" step="1" min="0" placeholder="30" value={formData.markupPercentage} onChange={(e) => setFormData({...formData, markupPercentage: e.target.value})} />
                          </div>
                        </div>
                        {liveCalc.numberOfBags > 0 && (
                          <div className="calc-box">
                            <div className="calc-grid">
                              <div className="calc-item"><p>Sacchetti</p><p className="text-purple">{liveCalc.numberOfBags}</p></div>
                              <div className="calc-item"><p>Costo</p><p>€{liveCalc.costPerBagBase.toFixed(2)}</p></div>
                              <div className="calc-item"><p>Prezzo</p><p className="text-green">€{liveCalc.suggestedPrice.toFixed(2)}</p></div>
                              <div className="calc-item"><p>Totale</p><p className="text-amber">€{(liveCalc.numberOfBags * liveCalc.suggestedPrice).toFixed(2)}</p></div>
                            </div>
                          </div>
                        )}
                      </div>

                      <div className="form-group">
                        <label>Note</label>
                        <textarea rows="2" placeholder="Annotazioni..." value={formData.notes} onChange={(e) => setFormData({...formData, notes: e.target.value})} />
                      </div>
                    </div>

                    <div className="modal-footer">
                      <button type="button" onClick={() => { setShowForm(false); resetForm(); }} className="btn btn-outline">Annulla</button>
                      <button type="submit" className="btn btn-amber">{editingId ? 'Salva' : 'Crea'}</button>
                    </div>
                  </form>
                </div>
              </div>
            )}

            {batches.length === 0 && !loading ? (
              <div className="card empty-state">
                <div className="empty-icon"><Icons.Leaf /></div>
                <h3>Nessun lotto</h3>
                <p>Inizia a tracciare i tuoi prodotti</p>
                <button onClick={() => setShowForm(true)} className="btn btn-amber"><Icons.Plus /> Nuovo Lotto</button>
              </div>
            ) : (
              <div className="batch-list">
                {filteredAndSortedBatches.map((batch) => {
                  const calc = getCalculatedFields(batch);
                  return (
                    <div key={batch.id} className="card batch-card">
                      <div className="batch-header">
                        <div className="batch-info">
                          <div className="batch-badges">
                            <span className={`badge ${categoryBadge(batch.productCategory)}`}>{batch.productCategory}</span>
                            {!calc.isComplete && <span className="badge badge-blue">Incompleto</span>}
                            {isExpired(batch.processingDate) && <span className="badge badge-expired">SCADUTO</span>}
                            {isExpiringSoon(batch.processingDate) && !isExpired(batch.processingDate) && <span className="badge badge-expiring">In scadenza</span>}
                          </div>
                          <h3 className="batch-title">
                            <span className="lot-number-inline">{batch.lotNumber}</span> {batch.productType}
                          </h3>
                          <p className="batch-date">
                            {formatDate(batch.processingDate)} • <strong>Scad. {formatExpiryDate(batch.processingDate)}</strong>
                          </p>
                        </div>

                        <div className="batch-stats">
                          <div className="batch-stat">
                            <p className="label">Fresco</p>
                            <p className="value">{batch.freshProductKg > 0 ? `${batch.freshProductKg}kg` : '-'}</p>
                          </div>
                          <div className="batch-stat">
                            <p className="label">Secco</p>
                            <p className="value text-orange">{batch.dryProductKg > 0 ? `${batch.dryProductKg}kg` : '-'}</p>
                          </div>
                          <div className="batch-stat">
                            <p className="label">Resa</p>
                            <p className="value text-purple">{calc.yieldPercentage > 0 ? `${calc.yieldPercentage.toFixed(0)}%` : '-'}</p>
                          </div>
                        </div>

                        <div className="batch-price">
                          {calc.numberOfBags > 0 && calc.suggestedSellingPrice > 0 ? (
                            <>
                              <p className="label">{calc.numberOfBags} sacch.</p>
                              <p className="value text-green">€{calc.suggestedSellingPrice.toFixed(2)}</p>
                              <p className="sub">cad.</p>
                            </>
                          ) : calc.totalCost > 0 ? (
                            <>
                              <p className="label">Costo</p>
                              <p className="value text-red">€{calc.totalCost.toFixed(2)}</p>
                            </>
                          ) : (
                            <p className="text-gray">-</p>
                          )}
                          <div className="batch-actions">
                            <button onClick={() => handleEdit(batch)} className="btn-icon"><Icons.Edit /></button>
                            <button onClick={() => handleDelete(batch.id)} className="btn-icon delete"><Icons.Trash /></button>
                          </div>
                        </div>
                      </div>

                      {calc.isComplete && (
                        <details>
                          <summary>Dettagli</summary>
                          <div className="details-grid">
                            <div className="detail-box green">
                              <p>Materia Prima</p>
                              <p className="total text-green">€{calc.rawMaterialCost.toFixed(2)}</p>
                            </div>
                            <div className="detail-box blue">
                              <p>Manodopera</p>
                              <p className="total text-blue">€{calc.laborCost.toFixed(2)}</p>
                            </div>
                            <div className="detail-box orange">
                              <p>Disidrat. ({calc.dehydrationHours.toFixed(1)}h)</p>
                              <p className="total text-orange">€{calc.dehydratorCost.toFixed(2)}</p>
                            </div>
                            <div className="detail-box purple">
                              <p>Packaging</p>
                              <p className="total text-purple">€{calc.totalPackagingCost.toFixed(2)}</p>
                            </div>
                          </div>
                          {calc.numberOfBags > 0 && (
                            <div className="bag-details">
                              <h4>💰 Per Sacchetto ({batch.bagWeightGrams}g)</h4>
                              <div className="bag-grid">
                                <div><p>Prodotto</p><p>€{calc.productCostPerBag.toFixed(3)}</p></div>
                                <div><p>Imball.</p><p>€{batch.packagingCostPerBag.toFixed(2)}</p></div>
                                <div><p>Etich.</p><p>€{batch.labelCostPerBag.toFixed(2)}</p></div>
                                <div><p>Costo</p><p><strong>€{calc.costPerBagBase.toFixed(2)}</strong></p></div>
                                <div><p>Prezzo</p><p className="text-green"><strong>€{calc.suggestedSellingPrice.toFixed(2)}</strong></p></div>
                              </div>
                            </div>
                          )}
                          {batch.notes && <div className="notes-box"><strong>Note:</strong> {batch.notes}</div>}
                        </details>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </main>

          <footer>
            <Icons.Cloud /> Sincronizzato con Google Sheets
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
