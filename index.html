<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    const API_URL = 'https://script.google.com/macros/s/AKfycbyb0UQrTYHj9GFFnDBmF4s29bnB3M71zNKKxzqsM7T3APOw5I34-sAnG2PQev6kp9oi/exec';
    const PRICES_API = 'https://sparkling-sun-07ad.aziendamalbosca.workers.dev/';

    const api = {
      async getAll() {
        const response = await fetch(`${API_URL}?action=getAll`);
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        return result.data || [];
      },
      async add(batch) {
        const response = await fetch(`${API_URL}?action=add&data=${encodeURIComponent(JSON.stringify(batch))}`);
        return response.json();
      },
      async update(batch) {
        const response = await fetch(`${API_URL}?action=update&data=${encodeURIComponent(JSON.stringify(batch))}`);
        return response.json();
      },
      async delete(id) {
        const response = await fetch(`${API_URL}?action=delete&id=${id}`);
        return response.json();
      }
    };

    // Prezzi caricati dinamicamente dal sito
    let SITE_PRICES = {};

    const loadSitePrices = async () => {
      try {
        const response = await fetch(PRICES_API);
        const data = await response.json();
        if (data.success && data.products) {
          data.products.forEach(p => {
            // Normalizza il nome per il matching
            const name = p.name.replace(/&#8217;/g, "'").replace(/&#8220;/g, '"').replace(/&#8221;/g, '"');
            SITE_PRICES[name] = {
              price: p.price,
              weight: p.weight,
              url: p.url,
              image: p.image,
              pricePerKg: p.weight ? (p.price / p.weight * 1000) : null
            };
          });
        }
      } catch (e) {
        console.error('Errore caricamento prezzi sito:', e);
      }
    };

    const findSitePrice = (productName) => {
      if (!productName) return null;
      const normalizedInput = productName.toLowerCase()
        .replace(/disidratata?o?i?e?/gi, '')
        .replace(/biologica?o?/gi, '')
        .replace(/senza zucchero/gi, '')
        .replace(/bio/gi, '')
        .trim();
      
      let bestMatch = null;
      let bestScore = 0;
      
      for (const [name, data] of Object.entries(SITE_PRICES)) {
        const normalizedSite = name.toLowerCase()
          .replace(/disidratata?o?i?e?/gi, '')
          .replace(/biologica?o?/gi, '')
          .replace(/senza zucchero/gi, '')
          .replace(/&#\d+;/g, '')
          .trim();
        
        // Exact match after normalization
        if (normalizedInput === normalizedSite) {
          return data;
        }
        
        // Check if main word matches (first word)
        const inputWords = normalizedInput.split(/\s+/).filter(w => w.length > 2);
        const siteWords = normalizedSite.split(/\s+/).filter(w => w.length > 2);
        
        let score = 0;
        for (const iw of inputWords) {
          for (const sw of siteWords) {
            // Exact word match
            if (iw === sw) score += 10;
            // Partial match (mirtillo/mirtilli)
            else if (iw.slice(0, -1) === sw.slice(0, -1) && iw.length > 4) score += 8;
            // Contains
            else if (sw.includes(iw) || iw.includes(sw)) score += 5;
          }
        }
        
        if (score > bestScore) {
          bestScore = score;
          bestMatch = data;
        }
      }
      
      return bestScore >= 8 ? bestMatch : null;
    };

    const getDayOfYear = (date) => {
      const d = new Date(date);
      const start = new Date(d.getFullYear(), 0, 1);
      return Math.floor((d - start) / (1000 * 60 * 60 * 24)) + 1;
    };

    const generateLotNumber = (date) => {
      const d = new Date(date);
      const dayOfYear = getDayOfYear(d).toString().padStart(3, '0');
      const year = d.getFullYear().toString().slice(-2);
      return `0${dayOfYear}${year}`;
    };

    const formatDate = (date) => date ? new Date(date).toLocaleDateString('it-IT') : '-';

    const calculateExpiryDate = (processingDate) => {
      if (!processingDate) return null;
      const date = new Date(processingDate);
      date.setFullYear(date.getFullYear() + 2);
      date.setMonth(date.getMonth() + 6);
      return date;
    };

    const formatExpiryDate = (processingDate) => {
      const expiry = calculateExpiryDate(processingDate);
      return expiry ? expiry.toLocaleDateString('it-IT', { month: '2-digit', year: 'numeric' }) : '-';
    };

    const isExpired = (processingDate) => {
      const expiry = calculateExpiryDate(processingDate);
      return expiry ? expiry <= new Date() : false;
    };

    const isExpiringSoon = (processingDate) => {
      const expiry = calculateExpiryDate(processingDate);
      if (!expiry) return false;
      const threeMonths = new Date();
      threeMonths.setMonth(threeMonths.getMonth() + 3);
      return expiry <= threeMonths && expiry > new Date();
    };

    const safeNum = (val) => parseFloat(val) || 0;

    const Icons = {
      Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Download: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      Trash: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
      Edit: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      Leaf: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>,
    };

    function App() {
      const [batches, setBatches] = useState([]);
      const [showForm, setShowForm] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [editingOriginalDate, setEditingOriginalDate] = useState(null);
      const [filterProduct, setFilterProduct] = useState('');
      const [sortBy, setSortBy] = useState('date-desc');
      const [status, setStatus] = useState('loading');
      const [loading, setLoading] = useState(false);
      
      const emptyForm = {
        productType: '', productCategory: 'frutta', processingDate: new Date().toISOString().split('T')[0],
        freshProductKg: '', rawMaterialCostPerKg: '', laborHours: '', laborCostPerHour: '',
        dehydrator40Hours: '', dehydrator40CostPerHour: '', dehydrator100Hours: '', dehydrator100CostPerHour: '',
        dryProductKg: '', bagWeightGrams: '', packagingCostPerBag: '', labelCostPerBag: '', bagLaborCost: '',
        markupPercentage: '', extraCost: '', vatRate: '10', notes: ''
      };
      
      const [formData, setFormData] = useState(emptyForm);

      const loadData = async () => {
        try {
          const data = await api.getAll();
          setBatches(data);
          setStatus('connected');
        } catch (err) {
          console.error(err);
          setStatus('error');
        }
      };

      useEffect(() => { loadData(); loadSitePrices(); }, []);

      const getCalc = (b) => {
        const dehy40Cost = safeNum(b.dehydrator40Hours) * safeNum(b.dehydrator40CostPerHour);
        const dehy100Cost = safeNum(b.dehydrator100Hours) * safeNum(b.dehydrator100CostPerHour);
        const totalDehyCost = dehy40Cost + dehy100Cost;
        const rawCost = safeNum(b.freshProductKg) * safeNum(b.rawMaterialCostPerKg);
        const laborCost = safeNum(b.laborHours) * safeNum(b.laborCostPerHour);
        const extraCost = safeNum(b.extraCost);
        const productionCost = rawCost + laborCost + totalDehyCost + extraCost;
        
        const dryKg = safeNum(b.dryProductKg);
        const costPerKg = dryKg > 0 ? productionCost / dryKg : 0;
        const markup = safeNum(b.markupPercentage);
        const pricePerKg = costPerKg * (1 + markup / 100);
        const vatRate = safeNum(b.vatRate);
        const pricePerKgWithVat = pricePerKg * (1 + vatRate / 100);
        
        const bagWeightKg = safeNum(b.bagWeightGrams) / 1000;
        const numBags = bagWeightKg > 0 ? Math.floor(dryKg / bagWeightKg) : 0;
        const packCost = safeNum(b.packagingCostPerBag);
        const labelCost = safeNum(b.labelCostPerBag);
        const bagLaborCost = safeNum(b.bagLaborCost);
        const productCostPerBag = bagWeightKg * costPerKg;
        const costPerBag = productCostPerBag + packCost + labelCost + bagLaborCost;
        const pricePerBag = costPerBag * (1 + markup / 100);
        const pricePerBagWithVat = pricePerBag * (1 + vatRate / 100);
        
        const yieldPct = safeNum(b.freshProductKg) > 0 ? (dryKg / safeNum(b.freshProductKg)) * 100 : 0;
        const isComplete = safeNum(b.freshProductKg) > 0 && dryKg > 0;
        
        const totalPackCost = numBags * (packCost + labelCost);
        const totalCost = productionCost + totalPackCost;
        
        return { dehy40Cost, dehy100Cost, totalDehyCost, rawCost, laborCost, extraCost, productionCost, costPerKg, pricePerKg, pricePerKgWithVat, numBags, costPerBag, pricePerBag, pricePerBagWithVat, yieldPct, isComplete, totalCost, totalPackCost, bagLaborCost };
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        
        // Usa la data originale se stiamo modificando
        const finalDate = editingId && editingOriginalDate ? editingOriginalDate : formData.processingDate;
        const lotNumber = generateLotNumber(new Date(finalDate));
        
        const batch = {
          id: editingId || Date.now().toString(),
          lotNumber,
          productType: formData.productType,
          productCategory: formData.productCategory,
          processingDate: finalDate,
          freshProductKg: safeNum(formData.freshProductKg),
          rawMaterialCostPerKg: safeNum(formData.rawMaterialCostPerKg),
          laborHours: safeNum(formData.laborHours),
          laborCostPerHour: safeNum(formData.laborCostPerHour),
          dehydrator40Hours: safeNum(formData.dehydrator40Hours),
          dehydrator40CostPerHour: safeNum(formData.dehydrator40CostPerHour),
          dehydrator100Hours: safeNum(formData.dehydrator100Hours),
          dehydrator100CostPerHour: safeNum(formData.dehydrator100CostPerHour),
          dryProductKg: safeNum(formData.dryProductKg),
          bagWeightGrams: safeNum(formData.bagWeightGrams),
          packagingCostPerBag: safeNum(formData.packagingCostPerBag),
          labelCostPerBag: safeNum(formData.labelCostPerBag),
          bagLaborCost: safeNum(formData.bagLaborCost),
          markupPercentage: safeNum(formData.markupPercentage),
          extraCost: safeNum(formData.extraCost),
          vatRate: safeNum(formData.vatRate),
          notes: formData.notes
        };
        
        try {
          if (editingId) {
            await api.update(batch);
          } else {
            await api.add(batch);
          }
          await loadData();
        } catch (err) {
          console.error(err);
        }
        
        setFormData(emptyForm);
        setEditingId(null);
        setEditingOriginalDate(null);
        setShowForm(false);
        setLoading(false);
      };

      const handleEdit = (b) => {
        setEditingOriginalDate(b.processingDate); // Salva la data originale
        setFormData({
          productType: b.productType || '',
          productCategory: b.productCategory || 'frutta',
          processingDate: b.processingDate || '',
          freshProductKg: b.freshProductKg?.toString() || '',
          rawMaterialCostPerKg: b.rawMaterialCostPerKg?.toString() || '',
          laborHours: b.laborHours?.toString() || '',
          laborCostPerHour: b.laborCostPerHour?.toString() || '',
          dehydrator40Hours: b.dehydrator40Hours?.toString() || '',
          dehydrator40CostPerHour: b.dehydrator40CostPerHour?.toString() || '',
          dehydrator100Hours: b.dehydrator100Hours?.toString() || '',
          dehydrator100CostPerHour: b.dehydrator100CostPerHour?.toString() || '',
          dryProductKg: b.dryProductKg?.toString() || '',
          bagWeightGrams: b.bagWeightGrams?.toString() || '',
          packagingCostPerBag: b.packagingCostPerBag?.toString() || '',
          labelCostPerBag: b.labelCostPerBag?.toString() || '',
          bagLaborCost: b.bagLaborCost?.toString() || '',
          markupPercentage: b.markupPercentage?.toString() || '',
          extraCost: b.extraCost?.toString() || '',
          vatRate: b.vatRate?.toString() || '10',
          notes: b.notes || ''
        });
        setEditingId(b.id);
        setShowForm(true);
      };

      const handleDelete = async (id) => {
        if (confirm('Eliminare questo lotto?')) {
          await api.delete(id);
          await loadData();
        }
      };

      const handleCloseForm = () => {
        setShowForm(false);
        setEditingId(null);
        setEditingOriginalDate(null);
        setFormData(emptyForm);
      };

      const liveCalc = getCalc(formData);
      
      const filtered = batches
        .filter(b => !filterProduct || b.productType === filterProduct)
        .sort((a, b) => {
          if (sortBy === 'date-desc') return new Date(b.processingDate) - new Date(a.processingDate);
          if (sortBy === 'date-asc') return new Date(a.processingDate) - new Date(b.processingDate);
          if (sortBy === 'expiry') return calculateExpiryDate(a.processingDate) - calculateExpiryDate(b.processingDate);
          return 0;
        });

      const uniqueProducts = [...new Set(batches.map(b => b.productType))].filter(Boolean).sort();

      const totals = filtered.reduce((acc, b) => {
        const c = getCalc(b);
        return {
          fresh: acc.fresh + safeNum(b.freshProductKg),
          dry: acc.dry + safeNum(b.dryProductKg),
          cost: acc.cost + c.totalCost,
          bags: acc.bags + c.numBags,
          incomplete: acc.incomplete + (c.isComplete ? 0 : 1)
        };
      }, { fresh: 0, dry: 0, cost: 0, bags: 0, incomplete: 0 });

      const categoryBadge = (cat) => ({ frutta: 'badge-red', verdura: 'badge-green', erbe: 'badge-purple', funghi: 'badge-amber' }[cat] || 'badge-blue');

      return (
        <div>
          <header className="header">
            <div className="container">
              <div className="header-content">
                <div className="header-title">
                  <div className="header-icon"><Icons.Leaf /></div>
                  <div><h1>Gestione Lotti</h1><p>Disidratazione Malbosca</p></div>
                </div>
                <div className="header-buttons">
                  <span className={`status-bar ${status}`}>{status === 'connected' ? '● Online' : '○ Errore'}</span>
                  <button onClick={() => { setFormData(emptyForm); setEditingId(null); setEditingOriginalDate(null); setShowForm(true); }} className="btn btn-primary"><Icons.Plus /></button>
                </div>
              </div>
            </div>
          </header>

          <main className="container">
            {batches.length > 0 && (
              <>
                <div className="stats-grid">
                  <div className="card stat-card"><p>Lotti</p><p className="text-amber">{filtered.length}</p></div>
                  <div className="card stat-card"><p>Fresco</p><p className="text-green">{totals.fresh.toFixed(1)}kg</p></div>
                  <div className="card stat-card"><p>Secco</p><p className="text-orange">{totals.dry.toFixed(1)}kg</p></div>
                  <div className="card stat-card"><p>Sacchetti</p><p className="text-indigo">{totals.bags}</p></div>
                  <div className="card stat-card"><p>Costi</p><p className="text-red">€{totals.cost.toFixed(0)}</p></div>
                  <div className="card stat-card"><p>Incompleti</p><p className="text-purple">{totals.incomplete}</p></div>
                </div>
                <div className="card filters">
                  <div className="filter-group">
                    <label>Prodotto:</label>
                    <select value={filterProduct} onChange={e => setFilterProduct(e.target.value)}>
                      <option value="">Tutti</option>
                      {uniqueProducts.map(p => <option key={p} value={p}>{p}</option>)}
                    </select>
                  </div>
                  <div className="filter-group">
                    <label>Ordina:</label>
                    <select value={sortBy} onChange={e => setSortBy(e.target.value)}>
                      <option value="date-desc">Data ↓</option>
                      <option value="date-asc">Data ↑</option>
                      <option value="expiry">Scadenza</option>
                    </select>
                  </div>
                </div>
              </>
            )}

            {showForm && (
              <div className="modal-overlay">
                <div className="modal">
                  <div className="modal-header">
                    <h2>{editingId ? 'Modifica Lotto' : 'Nuovo Lotto'}</h2>
                    {formData.processingDate && (
                      <p className="lot-info">
                        Lotto: <strong>{generateLotNumber(new Date(editingOriginalDate || formData.processingDate))}</strong> | 
                        Scadenza: <strong>{formatExpiryDate(editingOriginalDate || formData.processingDate)}</strong>
                        {editingId && <span style={{marginLeft: 8, color: '#6b7280'}}>(data bloccata)</span>}
                      </p>
                    )}
                  </div>
                  
                  <form onSubmit={handleSubmit}>
                    <div className="modal-body">
                      {/* Info base */}
                      <div className="form-grid form-grid-3" style={{marginBottom: 16}}>
                        <div className="form-group">
                          <label>Prodotto <span className="required-star">*</span></label>
                          <input type="text" required value={formData.productType} onChange={e => setFormData({...formData, productType: e.target.value})} />
                        </div>
                        <div className="form-group">
                          <label>Categoria</label>
                          <select value={formData.productCategory} onChange={e => setFormData({...formData, productCategory: e.target.value})}>
                            <option value="frutta">Frutta</option>
                            <option value="verdura">Verdura</option>
                            <option value="erbe">Erbe</option>
                            <option value="funghi">Funghi</option>
                          </select>
                        </div>
                        <div className="form-group">
                          <label>Data Produzione {editingId ? '(bloccata)' : <span className="required-star">*</span>}</label>
                          <input type="date" required={!editingId} disabled={!!editingId} value={formData.processingDate} onChange={e => setFormData({...formData, processingDate: e.target.value})} style={editingId ? {background: '#f3f4f6'} : {}} />
                        </div>
                      </div>

                      {/* Materia prima */}
                      <div className="form-section green">
                        <h3>🥬 Materia Prima</h3>
                        <div className="form-grid form-grid-2">
                          <div className="form-group"><label>Kg Fresco</label><input type="number" step="0.01" value={formData.freshProductKg} onChange={e => setFormData({...formData, freshProductKg: e.target.value})} /></div>
                          <div className="form-group"><label>€/kg</label><input type="number" step="0.01" value={formData.rawMaterialCostPerKg} onChange={e => setFormData({...formData, rawMaterialCostPerKg: e.target.value})} /></div>
                        </div>
                      </div>

                      {/* Manodopera */}
                      <div className="form-section blue">
                        <h3>👷 Manodopera</h3>
                        <div className="form-grid form-grid-2">
                          <div className="form-group"><label>Ore</label><input type="number" step="0.25" value={formData.laborHours} onChange={e => setFormData({...formData, laborHours: e.target.value})} /></div>
                          <div className="form-group"><label>€/ora</label><input type="number" step="0.01" value={formData.laborCostPerHour} onChange={e => setFormData({...formData, laborCostPerHour: e.target.value})} /></div>
                        </div>
                      </div>

                      {/* Disidratatori */}
                      <div className="form-section orange">
                        <h3>🔥 Disidratatori</h3>
                        <div className="form-grid form-grid-4">
                          <div className="form-group"><label>Mod.40 Ore</label><input type="number" step="0.5" value={formData.dehydrator40Hours} onChange={e => setFormData({...formData, dehydrator40Hours: e.target.value})} /></div>
                          <div className="form-group"><label>Mod.40 €/h</label><input type="number" step="0.01" value={formData.dehydrator40CostPerHour} onChange={e => setFormData({...formData, dehydrator40CostPerHour: e.target.value})} /></div>
                          <div className="form-group"><label>Mod.100 Ore</label><input type="number" step="0.5" value={formData.dehydrator100Hours} onChange={e => setFormData({...formData, dehydrator100Hours: e.target.value})} /></div>
                          <div className="form-group"><label>Mod.100 €/h</label><input type="number" step="0.01" value={formData.dehydrator100CostPerHour} onChange={e => setFormData({...formData, dehydrator100CostPerHour: e.target.value})} /></div>
                        </div>
                        {(liveCalc.dehy40Cost > 0 || liveCalc.dehy100Cost > 0) && (
                          <div className="form-info">
                            Mod.40: €{liveCalc.dehy40Cost.toFixed(2)} | Mod.100: €{liveCalc.dehy100Cost.toFixed(2)} | <strong>Totale: €{liveCalc.totalDehyCost.toFixed(2)}</strong>
                          </div>
                        )}
                      </div>

                      {/* Costi extra */}
                      <div className="form-section rose">
                        <h3>🚚 Costi Extra (trasporto, altro)</h3>
                        <div className="form-group"><label>€ Extra</label><input type="number" step="0.01" value={formData.extraCost} onChange={e => setFormData({...formData, extraCost: e.target.value})} /></div>
                      </div>

                      {/* Prodotto finito */}
                      <div className="form-section amber">
                        <h3>📦 Prodotto Finito</h3>
                        <div className="form-grid form-grid-3">
                          <div className="form-group"><label>Kg Secco</label><input type="number" step="0.01" value={formData.dryProductKg} onChange={e => setFormData({...formData, dryProductKg: e.target.value})} /></div>
                          <div className="form-group"><label>Margine %</label><input type="number" step="1" value={formData.markupPercentage} onChange={e => setFormData({...formData, markupPercentage: e.target.value})} /></div>
                          <div className="form-group"><label>IVA %</label><select value={formData.vatRate} onChange={e => setFormData({...formData, vatRate: e.target.value})}><option value="4">4%</option><option value="10">10%</option></select></div>
                        </div>
                        {liveCalc.costPerKg > 0 && (
                          <div className="price-display">
                            <div className="price-row"><span className="label">Resa</span><span className="value">{liveCalc.yieldPct.toFixed(1)}%</span></div>
                            <div className="price-row"><span className="label">Costo/kg</span><span className="value">€{liveCalc.costPerKg.toFixed(2)}</span></div>
                            <div className="price-row"><span className="label">Prezzo/kg (+{formData.markupPercentage || 0}%)</span><span className="value">€{liveCalc.pricePerKg.toFixed(2)}</span></div>
                            <div className="price-row total"><span className="label">Prezzo/kg con IVA {formData.vatRate}%</span><span className="value text-green">€{liveCalc.pricePerKgWithVat.toFixed(2)}</span></div>
                          </div>
                        )}
                      </div>

                      {/* Confezionamento */}
                      <div className="form-section purple">
                        <h3>🛍️ Confezionamento</h3>
                        <div className="form-grid form-grid-4">
                          <div className="form-group"><label>Peso sacch. (g)</label><input type="number" step="1" value={formData.bagWeightGrams} onChange={e => setFormData({...formData, bagWeightGrams: e.target.value})} /></div>
                          <div className="form-group"><label>€ Imballaggio</label><input type="number" step="0.01" value={formData.packagingCostPerBag} onChange={e => setFormData({...formData, packagingCostPerBag: e.target.value})} /></div>
                          <div className="form-group"><label>€ Etichetta</label><input type="number" step="0.01" value={formData.labelCostPerBag} onChange={e => setFormData({...formData, labelCostPerBag: e.target.value})} /></div>
                          <div className="form-group"><label>€ Manodopera/sacch.</label><input type="number" step="0.01" value={formData.bagLaborCost} onChange={e => setFormData({...formData, bagLaborCost: e.target.value})} /></div>
                        </div>
                        <div style={{marginTop: 8, fontSize: 11, color: '#6b7280'}}>N° Sacchetti: <strong>{liveCalc.numBags || '-'}</strong></div>
                        {liveCalc.numBags > 0 && (
                          <div className="price-display">
                            <div className="price-row"><span className="label">Costo prodotto/sacch.</span><span className="value">€{(safeNum(formData.bagWeightGrams)/1000 * liveCalc.costPerKg).toFixed(3)}</span></div>
                            <div className="price-row"><span className="label">Costo manodopera/sacch.</span><span className="value">€{safeNum(formData.bagLaborCost).toFixed(3)}</span></div>
                            <div className="price-row"><span className="label">Costo totale/sacchetto</span><span className="value">€{liveCalc.costPerBag.toFixed(2)}</span></div>
                            <div className="price-row"><span className="label">Prezzo/sacch. (+{formData.markupPercentage || 0}%)</span><span className="value">€{liveCalc.pricePerBag.toFixed(2)}</span></div>
                            <div className="price-row total"><span className="label">Prezzo/sacch. con IVA {formData.vatRate}%</span><span className="value text-green">€{liveCalc.pricePerBagWithVat.toFixed(2)}</span></div>
                          </div>
                        )}
                      </div>

                      {/* Note */}
                      <div className="form-group"><label>Note</label><textarea rows="2" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} /></div>
                    </div>

                    <div className="modal-footer">
                      <button type="button" onClick={handleCloseForm} className="btn btn-outline">Annulla</button>
                      <button type="submit" className="btn btn-amber" disabled={loading}>{loading ? 'Salvo...' : (editingId ? 'Salva' : 'Crea')}</button>
                    </div>
                  </form>
                </div>
              </div>
            )}

            {batches.length === 0 ? (
              <div className="card empty-state">
                <h3>Nessun lotto</h3>
                <p>Inizia creando il primo lotto</p>
                <button onClick={() => setShowForm(true)} className="btn btn-amber"><Icons.Plus /> Nuovo</button>
              </div>
            ) : (
              <div className="batch-list">
                {filtered.map(batch => {
                  const c = getCalc(batch);
                  const sitePrice = findSitePrice(batch.productType);
                  return (
                    <div key={batch.id} className="card batch-card">
                      <div className="batch-header">
                        <div className="batch-info">
                          <div className="batch-badges">
                            <span className={`badge ${categoryBadge(batch.productCategory)}`}>{batch.productCategory}</span>
                            {!c.isComplete && <span className="badge badge-blue">Incompleto</span>}
                            {isExpired(batch.processingDate) && <span className="badge badge-expired">SCADUTO</span>}
                            {isExpiringSoon(batch.processingDate) && !isExpired(batch.processingDate) && <span className="badge badge-expiring">In scadenza</span>}
                          </div>
                          <h3 className="batch-title"><span className="lot-number-inline">{batch.lotNumber}</span> {batch.productType}</h3>
                          <p className="batch-date">{formatDate(batch.processingDate)} • Scad. {formatExpiryDate(batch.processingDate)}</p>
                        </div>
                        <div className="batch-stats">
                          <div className="batch-stat"><p className="label">Fresco</p><p className="value">{batch.freshProductKg > 0 ? `${batch.freshProductKg}kg` : '-'}</p></div>
                          <div className="batch-stat"><p className="label">Secco</p><p className="value text-orange">{batch.dryProductKg > 0 ? `${batch.dryProductKg}kg` : '-'}</p></div>
                          <div className="batch-stat"><p className="label">Resa</p><p className="value text-purple">{c.yieldPct > 0 ? `${c.yieldPct.toFixed(0)}%` : '-'}</p></div>
                        </div>
                        <div className="batch-price">
                          {c.pricePerKgWithVat > 0 ? (
                            <>
                              <p className="label">€/kg IVA incl.</p>
                              <p className="value text-green">€{c.pricePerKgWithVat.toFixed(2)}</p>
                              <p className="sub">(€{c.pricePerKg.toFixed(2)} + IVA)</p>
                            </>
                          ) : c.totalCost > 0 ? (
                            <>
                              <p className="label">Costo</p>
                              <p className="value text-red">€{c.totalCost.toFixed(2)}</p>
                            </>
                          ) : <p className="text-gray">-</p>}
                          <div className="batch-actions">
                            <button onClick={() => handleEdit(batch)} className="btn-icon"><Icons.Edit /></button>
                            <button onClick={() => handleDelete(batch.id)} className="btn-icon delete"><Icons.Trash /></button>
                          </div>
                        </div>
                      </div>

                      {c.isComplete && (
                        <details>
                          <summary>Dettagli costi e prezzi</summary>
                          <div className="details-content">
                            <div className="detail-grid">
                              <div className="detail-box green"><p>Materia Prima</p><p className="value">€{c.rawCost.toFixed(2)}</p></div>
                              <div className="detail-box blue"><p>Manodopera</p><p className="value">€{c.laborCost.toFixed(2)}</p></div>
                              <div className="detail-box orange"><p>Disidratatori</p><p className="value">€{c.totalDehyCost.toFixed(2)}</p></div>
                              <div className="detail-box rose"><p>Extra</p><p className="value">€{c.extraCost.toFixed(2)}</p></div>
                            </div>
                            
                            {c.numBags > 0 && (
                              <div className="price-comparison">
                                <h4>💰 Prezzi Sacchetto ({batch.bagWeightGrams}g) - {c.numBags} pz</h4>
                                <div className="comparison-grid">
                                  <div className="comparison-item">
                                    <p className="label">Costo</p>
                                    <p className="our-price">€{c.costPerBag.toFixed(2)}</p>
                                  </div>
                                  <div className="comparison-item">
                                    <p className="label">Prezzo</p>
                                    <p className="our-price">€{c.pricePerBag.toFixed(2)}</p>
                                  </div>
                                  <div className="comparison-item">
                                    <p className="label">Con IVA {batch.vatRate}%</p>
                                    <p className="our-price">€{c.pricePerBagWithVat.toFixed(2)}</p>
                                  </div>
                                  {sitePrice && (
                                    <div className="comparison-item">
                                      <p className="label">Sito ({sitePrice.weight}g)</p>
                                      <p className="site-price">€{sitePrice.price.toFixed(2)}</p>
                                      {sitePrice.weight !== batch.bagWeightGrams && <p className="label" style={{color:'#6b7280', fontSize:9}}>peso diverso</p>}
                                    </div>
                                  )}
                                </div>
                              </div>
                            )}
                            
                            {sitePrice && sitePrice.pricePerKg && (
                              <div className="price-comparison" style={{marginTop: 8}}>
                                <h4>📊 Confronto Prezzo/kg con Sito</h4>
                                <div className="comparison-grid">
                                  <div className="comparison-item">
                                    <p className="label">Tuo prezzo/kg</p>
                                    <p className="our-price">€{c.pricePerKgWithVat.toFixed(2)}</p>
                                  </div>
                                  <div className="comparison-item">
                                    <p className="label">Sito/kg (da {sitePrice.weight}g)</p>
                                    <p className="site-price">€{sitePrice.pricePerKg.toFixed(2)}</p>
                                  </div>
                                  <div className="comparison-item">
                                    <p className="label">Differenza</p>
                                    <p style={{color: c.pricePerKgWithVat <= sitePrice.pricePerKg ? '#16a34a' : '#dc2626', fontWeight: 'bold'}}>
                                      {c.pricePerKgWithVat <= sitePrice.pricePerKg ? '' : '+'}€{(c.pricePerKgWithVat - sitePrice.pricePerKg).toFixed(2)}
                                    </p>
                                  </div>
                                  <div className="comparison-item">
                                    <p className="label">{c.pricePerKgWithVat <= sitePrice.pricePerKg ? '✓ OK' : '⚠ Più alto'}</p>
                                    <p className="our-price" style={{color: c.pricePerKgWithVat <= sitePrice.pricePerKg ? '#16a34a' : '#dc2626'}}>
                                      {((c.pricePerKgWithVat / sitePrice.pricePerKg - 1) * 100).toFixed(0)}%
                                    </p>
                                  </div>
                                </div>
                                <a href={sitePrice.url} target="_blank" rel="noopener" style={{display: 'block', textAlign: 'center', marginTop: 8, fontSize: 11, color: '#d97706'}}>🔗 Vedi su malbosca.it</a>
                              </div>
                            )}
                            
                            {batch.notes && <div style={{marginTop: 10, padding: 10, background: '#f9fafb', borderRadius: 6, fontSize: 12}}><strong>Note:</strong> {batch.notes}</div>}
                          </div>
                        </details>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </main>
          <footer>Malbosca - Gestione Lotti Disidratazione</footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
